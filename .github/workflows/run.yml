name: Daily Briefing Automation

on:
  schedule:
    # 세계 표준시(UTC) 기준 전날 23:00 = 한국 시간(KST) 매일 오전 08:00 정각 실행 설정
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동으로 즉시 실행 버튼 활성화 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-modules: 'pip'
    - name: Execute System
      env:
        NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
      run: python main.py
