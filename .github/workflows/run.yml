name: Daily Briefing Automation

on:
  schedule:
    # 세계 표준시(UTC) 기준 전날 23:00 = 한국 시간(KST) 매일 오전 08:00 정각 실행
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # 최신 버전으로 업데이트하여 경고 해결
    
    - name: Set up Python
      uses: actions/setup-python@v5 # 최신 버전으로 업데이트하여 경고 해결
      with:
        python-version: '3.10' # 오류가 났던 python-modules 항목을 올바르게 수정
        
    - name: Execute System
      env:
        NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
      run: python main.py
